<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CemAbyss | The Next Generation of Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<script>
    const savedTheme = localStorage.getItem('cem_theme');
    if(savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
</script>

    <div id="auth-shield" style="position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:none;align-items:center;justify-content:center;">
        <div style="background:#111;padding:40px;border-radius:12px;border:1px solid var(--border);width:100%;max-width:400px;text-align:center;" id="auth-form-container">
            <h2 style="margin-top:0" id="auth-title">Login</h2>
            <input type="text" id="login-user" placeholder="Username" onkeypress="if(event.key==='Enter')handleAuth()">
            <input type="password" id="login-pass" placeholder="Password" onkeypress="if(event.key==='Enter')handleAuth()">
            <button class="primary-btn" id="auth-btn" onclick="handleAuth()">Submit</button>
            <p style="margin-top:15px;color:var(--primary);cursor:pointer;font-weight:800;" id="auth-toggle" onclick="toggleAuthMode()">No account? Register</p>
        </div>
    </div>

    <nav id="nav-bar">
        <div style="display:flex; align-items:center; gap:15px; flex-shrink:0;">
            <div class="hamburger" onclick="toggleSidebar()"><div></div><div></div><div></div></div>
            <a href="#" class="logo" onclick="setContext('home')">CEM<span>ABYSS</span></a>
        </div>
        <div style="flex:1; display:flex; justify-content:center; padding: 0 15px;">
            <input type="text" id="global-search" placeholder="Search videos..." oninput="handleSearch()" style="width:100%; max-width:400px; height:40px; background:rgba(0,0,0,0.5); border-radius:100px; padding:0 20px;">
        </div>
        <div style="display:flex; align-items:center; gap:15px; flex-shrink:0;">
            <div id="u-coins" class="coin-chip">🪙 0</div>
            <div style="display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="setContext('settings')">
                <div id="u-name-display" style="font-weight:800; font-size:14px;"></div>
                <div id="nav-avatar" class="v-avatar"></div>
            </div>
            <button onclick="logout()" style="background:transparent; border:none; color:var(--text-dim); font-size:12px; font-weight:800; cursor:pointer;">Logout</button>
        </div>
    </nav>

    <aside id="side-bar">
        <div class="side-item active" onclick="setContext('home', this)">🏠 Home</div>
        <div class="side-item" onclick="setContext('studio', this)">🎬 Studio</div>
        <div class="side-item" onclick="setContext('announcements', this)">📢 Announcements</div>
        <div class="side-item" onclick="setContext('imageboard', this)">🖼️ Imageboard</div>
        <div class="side-item" onclick="setContext('marketplace', this)">🛍️ Marketplace</div>
        <div class="side-item" onclick="setContext('settings', this)">⚙️ Settings</div>
        <div class="side-item" id="admin-nav-item" style="display:none; color:var(--primary)" onclick="setContext('admin', this)">🛡️ Admin</div>
        <div class="side-item" style="color:var(--primary); margin-top:10px;" onclick="openUpload()">📤 Upload</div>
    </aside>

    <main id="main-area" style="display:none;">
        <div id="view-home" class="page-view active"><div id="pinned-container"></div><div class="grid" id="v-grid"></div></div>
        <div id="view-announcements" class="page-view"><div id="announcement-grid"></div></div>
        <div id="view-marketplace" class="page-view"><div class="marketplace-grid" id="market-grid"></div></div>
        <div id="view-settings" class="page-view">
            <div class="settings-card">
                <h3>Profile</h3>
                <input type="text" id="set-name" placeholder="New display name">
                <button class="primary-btn" onclick="saveName()">Save</button>
                <input type="file" id="set-pfp" accept="image/*"><button class="primary-btn" onclick="savePfp()">Upload</button>
            </div>
            <div class="settings-card"><h3>Themes</h3><div class="theme-grid" id="my-themes-grid"></div></div>
        </div>
        <div id="view-admin" class="page-view">
            <div class="settings-card"><h3>Banner</h3><textarea id="admin-banner-text"></textarea><button class="primary-btn" onclick="saveBanner()">Broadcast</button></div>
            <div class="settings-card"><h3>Ranks</h3><div id="admin-ranks-list"></div><input type="text" id="r-id" placeholder="Rank ID"><input type="text" id="r-badge-text" placeholder="Badge Text"><button class="primary-btn" onclick="saveRank()">Save Rank</button></div>
        </div>
    </main>

    <div id="player-page" style="display:none;">
        <div class="player-layout">
            <div class="video-wrapper" id="p-target"></div>
            <div id="p-title"></div><div id="p-uploader"></div><div id="p-likes">0</div>
            <div id="rec-grid"></div>
        </div>
    </div>

    <div id="modal-upload" class="modal-overlay">
        <div class="modal-box">
            <h3>Upload</h3>
            <input type="text" id="vid-name" placeholder="Title">
            <textarea id="vid-desc" placeholder="Desc"></textarea>
            <input type="file" id="vid-thumb" accept="image/*">
            <input type="file" id="vid-input">
            <div class="prog-bg" id="prog-bg"><div class="prog-bar" id="prog-bar"></div></div>
            <button class="primary-btn" id="publish-btn" onclick="handleUpload()">Publish</button>
            <p onclick="closeUpload()" style="cursor:pointer;">Cancel</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
