<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cemtube - Zoro(dev)</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,fill,grad@24,400,0,0" rel="stylesheet" />
    <style>
        :root { --orange: #ff9000; --bg: #0f0f0f; --nav: #0f0f0f; --text: #fff; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Roboto', Arial, sans-serif; margin: 0; padding-bottom: 70px; }
        
        nav { background: var(--nav); height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .logo { font-size: 20px; font-weight: bold; color: white; text-decoration: none; display: flex; align-items: center; }
        .logo span { background: var(--orange); color: #000; padding: 2px 5px; border-radius: 4px; margin-left: 4px; }
        
        aside { width: 240px; background: var(--bg); height: 100vh; position: fixed; top: 56px; padding-top: 10px; z-index: 999; }
        .side-item { padding: 12px 24px; cursor: pointer; display: flex; align-items: center; gap: 20px; transition: 0.2s; border-radius: 10px; margin: 0 10px; }
        .side-item:hover { background: #272727; }

        main { margin-left: 240px; margin-top: 70px; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .card { cursor: pointer; }
        .v-thumb { width: 100%; aspect-ratio: 16/9; background: #222; border-radius: 12px; object-fit: cover; }
        .v-meta { display: flex; gap: 12px; padding: 12px 5px; }
        .v-avatar { width: 36px; height: 36px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        #player-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; overflow-y: auto; }
        .video-wrapper { width: 100%; max-width: 1200px; margin: 0 auto; aspect-ratio: 16/9; margin-top: 10px; }
        iframe { width: 100%; height: 100%; border: none; }
        .p-details { max-width: 1200px; margin: 0 auto; padding: 15px; }

        .c-input { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid #272727; padding-top: 20px; }
        .c-input input { flex: 1; background: transparent; border: none; border-bottom: 1px solid #333; color: white; outline: none; padding: 5px; }
        .c-input button { background: var(--orange); border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        .b-nav { display: none; position: fixed; bottom: 0; width: 100%; background: var(--nav); height: 60px; border-top: 1px solid #222; justify-content: space-around; align-items: center; z-index: 1001; }

        @media (max-width: 768px) {
            aside { display: none; }
            main { margin-left: 0; }
            .b-nav { display: flex; }
        }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo" onclick="location.reload()">Cem<span>tube</span></a>
    <span class="material-symbols-outlined" onclick="alert('Upload coming soon to this UI!')" style="cursor:pointer">video_call</span>
</nav>

<aside>
    <div class="side-item" onclick="loadHome()"><span class="material-symbols-outlined">home</span> Home</div>
    <div class="side-item" onclick="loadHistory()"><span class="material-symbols-outlined">history</span> History</div>
    <div class="side-item" onclick="loadHistory()"><span class="material-symbols-outlined">video_library</span> Library</div>
</aside>

<main><div class="grid" id="v-grid">Loading Cemtube...</div></main>

<div class="b-nav">
    <span class="material-symbols-outlined" onclick="loadHome()">home</span>
    <span class="material-symbols-outlined" onclick="alert('Use Desktop to upload')">add_circle</span>
    <span class="material-symbols-outlined" onclick="loadHistory()">history</span>
</div>

<div id="player-page">
    <div style="padding: 10px;"><span class="material-symbols-outlined" onclick="closePlayer()" style="cursor:pointer">close</span></div>
    <div class="video-wrapper" id="p-target"></div>
    <div class="p-details">
        <h2 id="p-title" style="margin:0; font-size:20px;"></h2>
        <p id="p-uploader" style="color:var(--orange); font-weight:bold; margin:10px 0;"></p>
        
        <div class="c-input">
            <input type="text" id="c-text" placeholder="Add a comment...">
            <button onclick="sendComment()">Post</button>
        </div>
        <div id="c-list" style="margin-top:20px;"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzqSjqusGtZPvFjSRRCsDVdOlrluCrUJW96aXrJW9lxmaJ2oUeKLfWxN1WXf0W9MyF2/exec"; 
    let user = localStorage.getItem('cem_user') || prompt("Enter your Channel Name:");
    localStorage.setItem('cem_user', user);

    async function loadHome() {
        const res = await fetch(SCRIPT_URL);
        render(await res.json());
    }

    function render(list) {
        document.getElementById('v-grid').innerHTML = list.map(v => `
            <div class="card" onclick="play('${v.id}','${v.name}','${v.uploader}')">
                <img class="v-thumb" src="https://raw.githubusercontent.com/portonvpn/cemtube/main/t.png">
                <div class="v-meta">
                    <div class="v-avatar">${v.uploader.charAt(0).toUpperCase()}</div>
                    <div>
                        <div style="font-weight:bold; font-size:14px;">${v.name}</div>
                        <div style="color:#aaa; font-size:12px;">${v.uploader} • Cemtube</div>
                    </div>
                </div>
            </div>`).join('');
    }

    async function play(id, title, uploader) {
        document.getElementById('player-page').style.display = 'block';
        document.getElementById('p-title').innerText = title;
        document.getElementById('p-uploader').innerText = "@" + uploader;
        document.getElementById('p-target').innerHTML = `<iframe src="https://drive.google.com/file/d/${id}/preview" allow="autoplay"></iframe>`;
        
        // Save History
        fetch(SCRIPT_URL + `?action=addHistory&user=${user}&videoId=${id}`, {method:'POST', mode:'no-cors'});
        loadComments(id);
    }

    async function loadComments(id) {
        const res = await fetch(SCRIPT_URL + `?action=getComments&videoId=${id}`);
        const data = await res.json();
        document.getElementById('c-list').innerHTML = data.reverse().map(c => `
            <div style="margin-bottom:15px;">
                <small style="color:var(--orange)"><b>@${c.user}</b></small>
                <div style="font-size:14px;">${c.text}</div>
            </div>`).join('');
    }

    async function sendComment() {
        const text = document.getElementById('c-text').value;
        const vid = document.getElementById('p-target').querySelector('iframe').src.split('/d/')[1].split('/')[0];
        if(!text) return;
        await fetch(SCRIPT_URL + `?action=addComment&user=${user}&text=${text}&videoId=${vid}`, {method:'POST', mode:'no-cors'});
        document.getElementById('c-text').value = "";
        loadComments(vid);
    }

    async function loadHistory() {
        const res = await fetch(SCRIPT_URL + `?action=getHistory&user=${user}`);
        render(await res.json());
    }

    function closePlayer() { 
        document.getElementById('player-page').style.display = 'none'; 
        document.getElementById('p-target').innerHTML = ""; 
    }

    loadHome();
</script>
</body>
</html>
